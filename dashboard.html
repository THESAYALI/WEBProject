<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S.T.O.P. | Command Dashboard</title>
    <style>
        :root { --primary: #CCFF00; --bg: #121212; --card: #1e1e1e; --danger: #ff4747; }
        body { margin: 0; display: flex; background: var(--bg); color: #fff; font-family: sans-serif; }
        .sidebar { width: 240px; height: 100vh; background: #000; padding: 20px; border-right: 1px solid #333; position: fixed; }
        .main { margin-left: 280px; padding: 30px; width: 100%; }
        .nav-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; color: #888; transition: 0.3s; }
        .nav-item:hover { color: var(--primary); background: #111; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .hazard-box { background: #2a1a1a; border: 1px solid var(--danger); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .badge { background: var(--primary); color: #000; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--primary);">S.T.O.P.</h2>
        <div class="nav-item" onclick="location.reload()">Dashboard</div>
        <div class="nav-item" onclick="window.location.href='inventory.html'">Chemical Inventory</div>
        <div class="nav-item" onclick="window.location.href='report.html'">Report New Spill</div>
    </div>

    <div class="main">
        <header style="display: flex; justify-content: space-between;">
            <h1>Operational Overview <span id="roleDisplay" class="badge"></span></h1>
            <div id="clock" style="font-family: monospace; font-size: 20px; color: var(--primary);">00:00:00</div>
        </header>

        <div class="grid">
            <div class="stat-card"><h3>Gaseous Levels</h3><p>O2: 20.9% (Optimal)</p><p>H2S: 0.0ppm (Safe)</p></div>
            <div class="stat-card"><h3>Active Spills</h3><h1 id="spillCount">0</h1></div>
            <div class="stat-card"><h3>PPE Compliance</h3><h1>98%</h1></div>
        </div>

        <div class="hazard-box">
            <h3>⚠️ Live Hazard Alerts</h3>
            <div id="alertList">No active spills reported in this sector.</div>
        </div>
    </div>

    <script>
        document.getElementById('roleDisplay').innerText = localStorage.getItem('activeRole') || 'Guest';
        // Interconnection: Load spills from local storage
        const spills = JSON.parse(localStorage.getItem('spills') || '[]');
        document.getElementById('spillCount').innerText = spills.length;
        if(spills.length > 0) {
            document.getElementById('alertList').innerHTML = spills.map(s => 
                `<p><b>[${s.time}]</b> ${s.chemical} spill in Sector ${s.sector} - <span style="color:red">Urgent</span></p>`
            ).join('');
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S.T.O.P. | Chemical Vault</title>
    <style>
        :root { --primary: #CCFF00; --bg: #121212; --card: #1e1e1e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 40px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); }
        .table th, .table td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        .table th { background: #111; color: var(--primary); }
        .input-group { background: #000; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; }
        .back-btn { color: var(--primary); cursor: pointer; text-decoration: underline; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
    <h1>🧪 Chemical Inventory & Gaseous Hazards</h1>
    
    <div class="input-group">
        <input type="text" id="chemName" placeholder="Chemical Name">
        <input type="text" id="chemType" placeholder="Hazard (Toxic/Gas/Acid)">
        <input type="text" id="ppe" placeholder="Required PPE Kit">
        <button onclick="addChem()" style="background:var(--primary); border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">REGISTER CHEMICAL</button>
    </div>

    <table class="table">
        <thead><tr><th>ID</th><th>Name</th><th>Hazard Type</th><th>PPE Requirement</th></tr></thead>
        <tbody id="chemTable">
            <tr><td>#101</td><td>Sulfuric Acid</td><td>Corrosive/Toxic</td><td>Level B Suit, Face Shield</td></tr>
            <tr><td>#102</td><td>Ammonia</td><td>Gaseous/Toxic</td><td>Full Mask, Gas Filters</td></tr>
        </tbody>
    </table>

    <script>
        function addChem() {
            const name = document.getElementById('chemName').value;
            const type = document.getElementById('chemType').value;
            const ppe = document.getElementById('ppe').value;
            const row = `<tr><td>#${Math.floor(Math.random()*900)}</td><td>${name}</td><td>${type}</td><td>${ppe}</td></tr>`;
            document.getElementById('chemTable').innerHTML += row;
            // Clear inputs
            document.getElementById('chemName').value = '';
        }
    </script>
</body>
</html>

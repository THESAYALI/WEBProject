<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S.T.O.P. | Secure Login</title>
    <style>
        :root { --primary: #CCFF00; --bg: #0f0f0f; --card: #1a1a1a; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid #333; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; letter-spacing: -1px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b2e600; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">S.T.O.P.</div>
        <p style="opacity: 0.7;">Industrial Spill Management</p>
        <input type="text" id="user" placeholder="Employee ID (e.g. EMP-99)">
        <select id="role">
            <option value="Worker">Worker (Field Response)</option>
            <option value="Manager">Safety Manager</option>
            <option value="Admin">System Administrator</option>
            <option value="HR">HR / Compliance Head</option>
        </select>
        <button onclick="login()">INITIALIZE SYSTEM</button>
    </div>

    <script>
        function login() {
            const user = document.getElementById('user').value;
            const role = document.getElementById('role').value;
            if(!user) return alert("Enter ID");
            localStorage.setItem('activeUser', user);
            localStorage.setItem('activeRole', role);
            window.location.href = 'dashboard.html'; // Points to next page
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Weather Detector</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #6dd5ed, #2193b0);
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0px 6px 15px rgba(0,0,0,0.3);
    }
    input, button {
      padding: 12px;
      margin: 10px 0;
      width: 90%;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    input {
      background: rgba(255,255,255,0.8);
      color: #333;
    }
    button {
      background: #ff9800;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #e68900;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 10px;
    }
    .weather-img {
      margin-top: 20px;
      width: 200px;
      height: 200px;
    }
    .comment {
      margin-top: 15px;
      font-style: italic;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🌍 AI Weather Detector</h2>
    <input type="text" id="location" placeholder="Enter location (city)">
    <input type="date" id="date">
    <input type="time" id="time">
    <button onclick="getWeather()">Check Weather</button>
    <div class="result" id="result"></div>
    <img id="weatherImg" class="weather-img" src="" alt="">
    <div class="comment" id="comment"></div>
  </div>

  <script>
    async function getWeather() {
      const location = document.getElementById('location').value;
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;

      if (!location) {
        alert("Please enter a location!");
        return;
      }

      const apiKey = "YOUR_API_KEY"; // Replace with your OpenWeatherMap API key
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${location}&appid=${apiKey}&units=metric`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.cod !== 200) {
          document.getElementById('result').innerHTML = "❌ Location not found!";
          return;
        }

        const weather = data.weather[0].description;
        const temp = data.main.temp;
        const city = data.name;

        document.getElementById('result').innerHTML = `
          📍 Location: ${city}<br>
          📅 Date: ${date} <br>
          ⏰ Time: ${time} <br>
          🌡 Temperature: ${temp} °C <br>
          ☁ Condition: ${weather}
        `;

        // Show image & comment based on weather
        let imgSrc = "";
        let comment = "";

        if (weather.includes("cloud")) {
          imgSrc = "https://cdn-icons-png.flaticon.com/512/414/414825.png";
          comment = "☁ A cloudy day — perfect for reflection and calm vibes.";
        } else if (weather.includes("rain")) {
          imgSrc = "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
          comment = "🌧 Don’t forget your umbrella — rain brings freshness!";
        } else if (weather.includes("clear")) {
          imgSrc = "https://cdn-icons-png.flaticon.com/512/869/869869.png";
          comment = "☀ Clear skies ahead — a beautiful day to shine!";
        } else if (weather.includes("snow")) {
          imgSrc = "https://cdn-icons-png.flaticon.com/512/642/642102.png";
          comment = "❄ Snowfall — nature’s way of painting the world white.";
        } else {
          imgSrc = "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
          comment = "🌍 Weather is unique today — stay curious!";
        }

        document.getElementById('weatherImg').src = imgSrc;
        document.getElementById('comment').innerHTML = comment;

      } catch (error) {
        document.getElementById('result').innerHTML = "⚠ Error fetching weather data!";
      }
    }
  </script>
</body>
</html>
